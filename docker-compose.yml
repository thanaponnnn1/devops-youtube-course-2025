# Two services: backend API on 5003, frontend (nginx) on 5173
services:
  backend:
    build: ./server
    container_name: backend
    restart: always
    env_file:
      - ./server/.env        
    ports:
      - "5003:5003"
    

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5003/api
    container_name: frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend