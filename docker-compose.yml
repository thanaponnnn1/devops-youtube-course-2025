services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-net

  backend:
    image: mern-backend:jenkins   
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./server/.env        
    ports:
      - "5003:5003"
    depends_on:
      - mongodb
    networks:
      - mern-net

  frontend:
    image: mern-frontend:jenkins   
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - mern-net

volumes:
  mongo-data:

networks:
  mern-net:
    driver: bridge